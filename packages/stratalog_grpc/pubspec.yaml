dependencies:
  grpc: '>=4.2.0 <6.0.0'
  protobuf: ^4.2.0
  stratalog: ^0.1.0

dev_dependencies:
  checks: ^0.3.1
  chirp: ^0.9.0
  test: ">=1.25.0 <2.0.0"
  very_good_analysis: ^10.2.0
