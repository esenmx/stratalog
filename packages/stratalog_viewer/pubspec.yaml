name: stratalog_viewer
description: In-app log viewer for stratalog — ring-buffer writer plus a Flutter page with layer colors, level filter, and search.
version: 0.1.0
homepage: https://mehmetesen.com
repository: https://github.com/esenmx/stratalog
issue_tracker: https://github.com/esenmx/stratalog/issues
resolution: workspace

topics:
  - logging
  - debugging
  - observability

environment:
  sdk: ^3.11.0
  flutter: ">=3.38.0"

dependencies:
  chirp: ^0.9.0
  flutter:
    sdk: flutter
  stratalog: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0
