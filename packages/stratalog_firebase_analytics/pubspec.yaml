name: stratalog_firebase_analytics
description: Logging facade over FirebaseAnalytics for stratalog — every dispatched event mirrored into the Analytics log layer.
version: 0.1.0
homepage: https://mehmetesen.com
repository: https://github.com/esenmx/stratalog
issue_tracker: https://github.com/esenmx/stratalog/issues
resolution: workspace

topics:
  - logging
  - analytics
  - firebase
  - observability

environment:
  sdk: ^3.11.0
  flutter: ">=3.38.0"

dependencies:
  firebase_analytics: ^12.4.3
  flutter:
    sdk: flutter
  stratalog: ^0.1.0

dev_dependencies:
  build_runner: ^2.15.0
  checks: ^0.3.1
  chirp: ^0.9.0
  firebase_analytics_platform_interface: ^6.0.3
  firebase_core: ^4.11.0
  flutter_test:
    sdk: flutter
  mockito: ^5.6.4
  very_good_analysis: ^10.2.0
