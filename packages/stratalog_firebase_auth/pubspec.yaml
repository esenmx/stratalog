name: stratalog_firebase_auth
description: FirebaseAuth tap for stratalog — auth state, ID-token refreshes, and OAuth provider context (Google/Apple/...) into the Auth log layer.
version: 0.1.0
homepage: https://mehmetesen.com
repository: https://github.com/esenmx/stratalog
issue_tracker: https://github.com/esenmx/stratalog/issues
resolution: workspace

topics:
  - logging
  - firebase
  - authentication
  - observability

environment:
  sdk: ^3.11.0
  flutter: ">=3.38.0"

dependencies:
  firebase_auth: ^6.1.0
  flutter:
    sdk: flutter
  stratalog: ^0.1.0

dev_dependencies:
  chirp: ^0.9.0
  firebase_auth_mocks: ^0.15.2
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0
