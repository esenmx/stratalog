name: stratalog_sentry
description: Sentry CrashReporter adapter for stratalog — error+ records become Sentry events, info+ become breadcrumbs. Pure Dart; works with sentry_flutter.
version: 0.1.0
homepage: https://mehmetesen.com
repository: https://github.com/esenmx/stratalog
issue_tracker: https://github.com/esenmx/stratalog/issues
resolution: workspace

topics:
  - logging
  - crash-reporting
  - observability

environment:
  sdk: ^3.11.0

dependencies:
  sentry: ^9.23.0
  stratalog: ^0.1.0

dev_dependencies:
  checks: ^0.3.1
  chirp: ^0.9.0
  test: ^1.30.0
  very_good_analysis: ^10.2.0
