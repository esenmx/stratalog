name: stratalog_workspace
publish_to: "none"

environment:
  sdk: ^3.11.0

workspace:
  - packages/stratalog
  - packages/stratalog_auto_route
  - packages/stratalog_connectrpc
  - packages/stratalog_crashlytics
  - packages/stratalog_dio
  - packages/stratalog_firebase_auth
  - packages/stratalog_grpc
  - packages/stratalog_riverpod
  - packages/stratalog_sentry

dev_dependencies:
  melos: 8.0.0

melos:
  ide:
    intellij: false

  scripts:
    analyze:
      description: Run `dart analyze` across every workspace member.
      exec:
        command: dart analyze .
        concurrency: 4

    format:
      description: Run `dart format` across every workspace member.
      exec:
        command: dart format .
        concurrency: 4

    test:
      description: Run tests in every package with a `test/` directory.
      exec:
        command: flutter test
        concurrency: 1
      packageFilters:
        dirExists: test
